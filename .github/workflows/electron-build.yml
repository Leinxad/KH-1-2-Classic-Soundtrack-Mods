name: Build Electron App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        run: npm run electron:build
        env:
          VITE_ZIPS_BASE_URL: ${{ vars.VITE_ZIPS_BASE_URL }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KH-Track-Selector-win32-x64
          path: release\KH-Track-Selector-win32-x64\
          retention-days: 30

      - name: Zip build output
        run: Compress-Archive -Path "release\KH-Track-Selector-win32-x64\*" -DestinationPath "release\KH-Track-Selector-win32-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "KH Track Selector - Build ${{ github.run_number }}"
          files: release\KH-Track-Selector-win32-x64.zip

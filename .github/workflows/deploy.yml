name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare switcher patches
        run: npm run prepare:switcher
        env:
          VITE_ZIPS_BASE_URL: ${{ vars.VITE_ZIPS_BASE_URL }}

      - name: Publish switcher patches release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: switcher-assets
          name: Switcher Patch Assets
          files: .generated/switcher-patches/*.kh*pcpatch
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_ZIPS_BASE_URL: ${{ vars.VITE_ZIPS_BASE_URL }}
          VITE_SWITCHER_ASSETS_BASE_URL: https://github.com/${{ github.repository }}/releases/download/switcher-assets

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deploy
